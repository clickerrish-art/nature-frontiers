name: Auto Publish YouTube Videos

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "auto-publish"
  cancel-in-progress: false

jobs:
  auto-publish:
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create .env file from secrets
        run: |
          cat > .env << EOF
          YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID=UC41xXhw22o6Q2I2pTKB2kOg
          YOUTUBE_PLAYLISTS=PLhErNUuDxs_2F8ayJ_XDrgCbH-CiAqRcd,PLhErNUuDxs_04gGj-HoaSkXNQ1bno89I8,PLhErNUuDxs_0OFY1a8itinxcWutV7oN78,PLhErNUuDxs_3s5P3kfBg1wZdWJY_PmAfC
          DASHSCOPE_API_KEY=${{ secrets.DASHSCOPE_API_KEY }}
          QWEN_MODEL=qwen-plus
          MAX_TITLE_LENGTH=100
          TWITTER_API_KEY=${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET=${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN=${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET=${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TWITTER_BEARER_TOKEN=${{ secrets.TWITTER_BEARER_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID=${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          TIKTOK_ACCESS_TOKEN=${{ secrets.TIKTOK_ACCESS_TOKEN }}
          LINKEDIN_ACCESS_TOKEN=${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN=${{ secrets.LINKEDIN_PERSON_URN }}
          LINKEDIN_ORGANIZATION_URN=${{ secrets.LINKEDIN_ORGANIZATION_URN }}
          ENABLE_TWITTER=true
          ENABLE_INSTAGRAM=true
          ENABLE_TIKTOK=true
          ENABLE_LINKEDIN=true
          LINKEDIN_POST_MODE=link
          LOG_LEVEL=INFO
          OUTPUT_DIR=output
          STATE_FILE=processed_videos.txt
          EOF
      
      - name: Restore processed videos state
        uses: actions/cache@v4
        with:
          path: processed_videos.txt
          key: ${{ runner.os }}-processed-videos-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-processed-videos-
      
      - name: Run auto publisher
        run: |
          python main.py
        env:
          PYTHONUNBUFFERED: 1
      
      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-logs
          path: logs/
          retention-days: 7
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './output'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
